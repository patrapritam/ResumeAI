# Render Blueprint - TalentLens
# Deploy all services with: https://render.com/deploy

services:
  # Backend API (Node.js)
  - type: web
    name: talentlens-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # You'll set this manually
      - key: JWT_SECRET
        generateValue: true
      - key: NLP_SERVICE_URL
        sync: false # Set to your NLP service URL after deploy
      - key: CLIENT_URL
        sync: false # Set to your client URL after deploy
    healthCheckPath: /api/health

  # NLP Service (Python/FastAPI)
  - type: web
    name: talentlens-nlp
    runtime: python
    rootDir: nlp-service
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /health

  # Frontend Client (Vite/React Static Site)
  - type: web
    name: talentlens-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false # Set to your API service URL after deploy (e.g. https://talentlens-api.onrender.com/api)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
